# Cargo configuration for vertex workspace

# The native build carries no global rustflags. The tokio-console and pprof
# profiling builds are opt-in and pass their own flags via RUSTFLAGS (see the
# justfile recipes and docs/observability/profiling.md): tokio_unstable so
# tokio emits the task instrumentation the tokio-console feature consumes,
# force-frame-pointers for pprof flamegraphs. Keeping them out of the default
# build leaves release artifacts free of dev-only codegen.

# wasm32 builds on the pinned stable toolchain: the cone is single-threaded, so
# only the getrandom browser backend cfg is needed (no atomics, no nightly).
[target.wasm32-unknown-unknown]
rustflags = ["--cfg", 'getrandom_backend="wasm_js"']
