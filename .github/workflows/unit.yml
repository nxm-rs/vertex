name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-on-failure: true
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy (production)
        run: cargo clippy --lib --all-features -- -D warnings
      - name: Clippy (tests)
        run: cargo clippy --tests --benches --all-features -- -D warnings -A clippy::unwrap_used -A clippy::expect_used -A clippy::indexing_slicing
      # Keep the embedded FFI cone free of the native observability server stack
      # (Prometheus exporter, OTLP appender). Pure `cargo tree`, no compile.
      - name: Cone guard (ffi)
        run: |
          tree="$(cargo tree -p vertex-ffi -e normal)"
          leaked=""
          for crate in metrics-exporter-prometheus opentelemetry-appender-tracing; do
            if grep -q "$crate" <<<"$tree"; then
              leaked="$leaked $crate"
            fi
          done
          if [ -n "$leaked" ]; then
            echo "cone guard: vertex-ffi pulls the observability server stack:$leaked" >&2
            exit 1
          fi
          echo "cone guard: vertex-ffi is free of the observability server stack"

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@1b57bc699ba2af96a06eb2a2a0d32b43a7d8e8b8  # nextest
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: cargo nextest run --workspace --all-features --no-tests=warn

  doc:
    name: doc
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-on-failure: true
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run doctests
        run: cargo test --doc --workspace --all-features

  wasm:
    name: wasm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      # Nightly is required for now: the threaded-wasm dependencies of
      # nectar-primitives need the unstable `atomics` target feature, which
      # stable rustc does not expose. The target rustflags live in
      # .cargo/config.toml; see docs/agents/wasm.md.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # nightly
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-on-failure: true
      # `+nightly` is load-bearing: rust-toolchain.toml pins the stable
      # channel and would otherwise override the installed nightly.
      - name: Build peer stack for wasm32
        run: cargo +nightly build --target wasm32-unknown-unknown -p vertex-util-runtime -p vertex-swarm-peer-score -p vertex-swarm-peer-manager -p vertex-tasks -p vertex-net-dnsaddr-doh
      # The full client cone: `vertex-swarm-node` pulls topology and every
      # `/swarm/...` wire protocol, so this is the milestone wasm build for a
      # browser client node.
      - name: Build client cone for wasm32
        run: cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-node
      # The wasm-bindgen acceptance test for the converged client core: it
      # composes the pseudosettle accounting and round-trips the in-memory
      # cache, the first wasm test in the repo. Built here (not run, which needs
      # a headless browser runner) as the wasm-reachability gate.
      - name: Build wasm client-core test for wasm32
        run: cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-node --test wasm_client_core
      # The chain-free SWAP path: cheque exchange (sign, send, validate, credit)
      # needs no chain, so the accounting stack and `vertex-swarm-node/swap`
      # build for wasm with default features. The on-chain cashout path
      # (`swap-chequebook`) is excluded; it lands in a later change.
      - name: Build chain-free swap path for wasm32
        run: cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-node --features swap -p vertex-swarm-accounting-swap -p vertex-swarm-accounting-chequebook -p vertex-swarm-accounting-pseudosettle -p vertex-swarm-accounting-pricing -p vertex-swarm-accounting
      # The on-chain cashout path: the chequebook client and the swap cashout
      # logic are transport-generic, so with `swap-chequebook` selecting the
      # browser fetch transport they build for wasm. `vertex-chain` is the shared
      # provider crate they sit on.
      - name: Build cashout path for wasm32
        run: |
          cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-accounting-chequebook --features swap-chequebook
          cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-accounting-swap --features swap-chequebook
          cargo +nightly build --target wasm32-unknown-unknown -p vertex-chain

  ci-success:
    name: ci success
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, clippy, test, doc, wasm]
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
