name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-on-failure: true
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy (production)
        run: cargo clippy --lib --all-features -- -D warnings
      - name: Clippy (tests)
        run: cargo clippy --tests --benches --all-features -- -D warnings -A clippy::unwrap_used -A clippy::expect_used -A clippy::indexing_slicing
      # Keep the embedded FFI cone free of the native observability server stack
      # (Prometheus exporter, OTLP appender). Pure `cargo tree`, no compile.
      - name: Cone guard (ffi)
        run: |
          tree="$(cargo tree -p vertex-ffi -e normal)"
          leaked=""
          for crate in metrics-exporter-prometheus opentelemetry-appender-tracing; do
            if grep -q "$crate" <<<"$tree"; then
              leaked="$leaked $crate"
            fi
          done
          if [ -n "$leaked" ]; then
            echo "cone guard: vertex-ffi pulls the observability server stack:$leaked" >&2
            exit 1
          fi
          echo "cone guard: vertex-ffi is free of the observability server stack"

  # The `vertex` binary ships two cones: the default bare client (no storer code,
  # no chain, no swap) and the full storer node behind `--features storer`. The
  # --all-features clippy/test jobs already cover the union; this job pins the two
  # shipped cones and enforces that the default tree never resolves the storer
  # crates.
  features:
    name: features
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-on-failure: true
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # A workspace member must not enable chain/swap/storer on a shared crate:
      # feature unification would pull that cone into the default client. Checking
      # the binary in isolation with no default features guards that footgun.
      - name: Check bare client cone (no default features)
        run: cargo check -p vertex --no-default-features
      - name: Build default client cone
        run: cargo build -p vertex
      - name: Clippy default client cone
        run: cargo clippy -p vertex -p vertex-swarm-builder -p vertex-swarm-node --all-targets -- -D warnings
      # The chain-free swap client: cheque exchange without the storer cone.
      - name: Build swap client cone
        run: cargo build -p vertex --features swap
      - name: Build storer cone
        run: cargo build -p vertex --features storer
      - name: Clippy storer cone
        run: cargo clippy -p vertex -p vertex-swarm-builder -p vertex-swarm-node --all-targets --features storer -- -D warnings
      # The embedded FFI client cdylib: native-only, client-only.
      - name: Build FFI cone
        run: cargo build -p vertex-ffi
      # The default binary must not resolve the storer code cone. Pure
      # `cargo tree`, no compile.
      - name: Storer cone guard (default vertex)
        run: |
          tree="$(cargo tree -p vertex -e features)"
          leaked=""
          for crate in vertex-swarm-storer vertex-swarm-puller vertex-swarm-redistribution vertex-swarm-storer-behaviour; do
            if grep -q "$crate" <<<"$tree"; then
              leaked="$leaked $crate"
            fi
          done
          if [ -n "$leaked" ]; then
            echo "cone guard: default vertex pulls the storer cone:$leaked" >&2
            exit 1
          fi
          echo "cone guard: default vertex is free of the storer cone"
      # The embedded FFI client must not resolve the storer code cone either: it
      # is a client, and never enables the builder's `storer-core`.
      - name: Storer cone guard (vertex-ffi)
        run: |
          tree="$(cargo tree -p vertex-ffi -e normal)"
          leaked=""
          for crate in vertex-swarm-storer vertex-swarm-puller vertex-swarm-redistribution vertex-swarm-storer-behaviour; do
            if grep -q "$crate" <<<"$tree"; then
              leaked="$leaked $crate"
            fi
          done
          if [ -n "$leaked" ]; then
            echo "cone guard: vertex-ffi pulls the storer cone:$leaked" >&2
            exit 1
          fi
          echo "cone guard: vertex-ffi is free of the storer cone"

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@1b57bc699ba2af96a06eb2a2a0d32b43a7d8e8b8  # nextest
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: cargo nextest run --workspace --all-features --no-tests=warn

  doc:
    name: doc
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-on-failure: true
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run doctests
        run: cargo test --doc --workspace --all-features

  wasm:
    name: wasm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      # Nightly is required for now: the threaded-wasm dependencies of
      # nectar-primitives need the unstable `atomics` target feature, which
      # stable rustc does not expose. The target rustflags live in
      # .cargo/config.toml; see docs/agents/wasm.md.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # nightly
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown
          # rust-src is needed to rebuild std from source for the threaded-wasm
          # demo (its `.cargo/config.toml` sets `build-std`).
          components: rust-src
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-on-failure: true
      # `+nightly` is load-bearing: rust-toolchain.toml pins the stable
      # channel and would otherwise override the installed nightly.
      - name: Build peer stack for wasm32
        run: cargo +nightly build --target wasm32-unknown-unknown -p vertex-util-runtime -p vertex-swarm-peer-score -p vertex-swarm-peer-manager -p vertex-tasks -p vertex-net-dnsaddr-doh
      # The full client cone: `vertex-swarm-node` pulls topology and every
      # `/swarm/...` wire protocol, so this is the milestone wasm build for a
      # browser client node.
      - name: Build client cone for wasm32
        run: cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-node
      # The wasm-bindgen acceptance test for the converged client core: it
      # composes the pseudosettle and SWAP accounting, round-trips the in-memory
      # and IndexedDB-backed caches, and is the wasm-reachability gate. Built
      # with the `swap-chequebook` and `indexeddb` features so the swap-provider
      # and persisted-cache test bodies are compiled. Built here (not run, which
      # needs a headless browser runner).
      - name: Build wasm client-core test for wasm32
        run: cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-node --features "swap-chequebook indexeddb" --test wasm_client_core
      # The chain-free SWAP path: cheque exchange (sign, send, validate, credit)
      # needs no chain, so the accounting stack and `vertex-swarm-node/swap`
      # build for wasm with default features.
      - name: Build chain-free swap path for wasm32
        run: cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-node --features swap -p vertex-swarm-accounting-swap -p vertex-swarm-accounting-chequebook -p vertex-swarm-accounting-pseudosettle -p vertex-swarm-accounting-pricing -p vertex-swarm-accounting
      # The on-chain cashout path: the chequebook client and the swap cashout
      # logic are transport-generic, so with `swap-chequebook` selecting the
      # browser fetch transport they build for wasm. `vertex-chain` is the shared
      # provider crate they sit on; its `provider` feature builds the
      # `build_chain_provider` construction seam over the browser fetch transport.
      # `vertex-swarm-node/swap-chequebook` is the full launcher cone wiring that
      # cashout into the embedded client.
      - name: Build cashout path for wasm32
        run: |
          cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-accounting-chequebook --features swap-chequebook
          cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-accounting-swap --features swap-chequebook
          cargo +nightly build --target wasm32-unknown-unknown -p vertex-chain --features provider
          cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-node --features swap-chequebook
      # The wasm-bindgen reachability test for the construction seam: it asserts
      # `ProviderBuilder::new().connect_http(url)` links and constructs on wasm32
      # without a live RPC. Built here (not run, which needs a headless browser).
      - name: Build chain provider wasm test for wasm32
        run: cargo +nightly build --target wasm32-unknown-unknown -p vertex-chain --features provider --tests
      # The browser cache backend: the IndexedDB `Database` impl and the
      # `ChunkStore` backend that mirrors to it build for wasm under the
      # `indexeddb` feature.
      - name: Build IndexedDB cache backend for wasm32
        run: |
          cargo +nightly build --target wasm32-unknown-unknown -p vertex-storage-indexeddb
          cargo +nightly build --target wasm32-unknown-unknown -p vertex-swarm-localstore --features indexeddb
      # The browser demo is the integration target: a swap-capable client node
      # with the IndexedDB cache. It is its own workspace root (own
      # `.cargo/config.toml` with the threaded-wasm `build-std` config), so it is
      # built from inside its directory. Its `vertex-swarm-node` dep carries the
      # `swap`/`swap-chequebook` and `indexeddb` features.
      - name: Build browser demo for wasm32
        working-directory: bin/swarm-demo
        run: cargo +nightly build --target wasm32-unknown-unknown

  ci-success:
    name: ci success
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, clippy, features, test, doc, wasm]
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
