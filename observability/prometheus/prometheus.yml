global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: vertex-local
    namespace: default

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9099"]

  # Tempo metrics (Prometheus on host network, Tempo port published to host)
  - job_name: "tempo"
    static_configs:
      - targets: ["localhost:3200"]

  # Vertex node metrics (Prometheus on host network can reach localhost directly)
  - job_name: "vertex"
    scrape_interval: 10s
    static_configs:
      - targets:
          - "localhost:9191"
        labels:
          instance: "vertex-local"
    # Add more nodes as needed:
    # - targets:
    #     - "localhost:9192"
    #   labels:
    #     instance: "vertex-local-2"

  # Optional: scrape other services on host
  # - job_name: "your-service"
  #   static_configs:
  #     - targets: ["localhost:PORT"]

# Alerting rules (optional)
# rule_files:
#   - "alerts/*.yml"

