# Observability stack for Vertex Swarm
# All services use host networking for simplicity

services:
  # Tempo - Distributed Tracing
  tempo:
    image: grafana/tempo:2.7.1
    container_name: vertex-tempo
    network_mode: host
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    # Ports (on host): 3200 (HTTP), 4317 (OTLP gRPC), 4318 (OTLP HTTP), 9411 (Zipkin)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - Metrics
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: vertex-prometheus
    network_mode: host
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.listen-address=0.0.0.0:9099"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
      - "--enable-feature=native-histograms"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    # Port (on host): 9099
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9099/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:3.3.2
    container_name: vertex-loki
    network_mode: host
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    # Port (on host): 3100
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:11.4.0
    container_name: vertex-grafana
    network_mode: host
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor tempoSearch tempoBackendSearch tempoApmTable
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    # Port (on host): 3000
    depends_on:
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

  # Promtail - Log shipper for vertex logs
  promtail:
    image: grafana/promtail:3.3.2
    container_name: vertex-promtail
    network_mode: host
    volumes:
      - ./promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - ${VERTEX_LOG_DIR:-/tmp/vertex-logs}:/vertex-logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    depends_on:
      - loki

volumes:
  tempo-data:
  prometheus-data:
  loki-data:
  grafana-data:
