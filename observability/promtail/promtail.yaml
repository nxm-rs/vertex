server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape vertex log files from mounted host directory
  - job_name: vertex-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: vertex
          __path__: /vertex-logs/vertex.log*
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            target: target
            timestamp: timestamp
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          target:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # Scrape Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            target: target
            timestamp: timestamp
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          target:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
