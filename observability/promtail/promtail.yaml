server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  # Scrape vertex log files from mounted host directory
  - job_name: vertex-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: vertex
          __path__: /vertex-logs/vertex.log*
    pipeline_stages:
      # Extract top-level fields from tracing-subscriber JSON format
      - json:
          expressions:
            level: level
            target: target
            timestamp: timestamp
            message: 'fields.message'
      # Derive a short crate label from the full target path
      # e.g. "vertex_swarm_net_hive::protocol" -> "vertex_swarm_net_hive"
      - regex:
          source: target
          expression: '^(?P<crate>[^:]+)'
      # Only promote low-cardinality labels to stream labels.
      # target (23+ values) stays as extracted metadata for filtering,
      # but not as a stream label to avoid stream churn.
      - labels:
          level:
          crate:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # Scrape Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      - json:
          expressions:
            level: level
            target: target
            timestamp: timestamp
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
