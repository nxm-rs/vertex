[package]
name = "vertex-swarm-builder"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Swarm node builder infrastructure"

[lints]
workspace = true

[features]
default = []
# Construct a shared Ethereum alloy provider for chain-needing node types
# (storer, and a client with SWAP enabled). Native-only: pulls the alloy RPC
# stack (HTTP transport via reqwest) and the on-chain chequebook client. Off by
# default so the client node and the wasm build stay completely chain-free; the
# cone guard (`just check-cone`) enforces this.
chain = [
    "dep:vertex-chain",
    "vertex-swarm-accounting-chequebook/swap-chequebook",
    "dep:alloy-provider",
    "dep:alloy-network",
    "dep:alloy-signer-local",
    "dep:alloy-chains",
    # When the swap service is also present, the chain unlocks on-chain cashout
    # of received cheques. Without `swap` this is a no-op.
    "vertex-swarm-accounting-swap?/swap-chequebook",
]
# SWAP cheque-based settlement. Wires the chequebook settlement service into
# bandwidth accounting and routes the swap wire events. Chain-free on its own:
# cheque exchange (sign, send, validate, credit) needs no chain. Combine with
# `chain` to enable on-chain cashout of received cheques. Off by default so the
# chain-free client node stays the default cone.
swap = [
    "dep:vertex-swarm-accounting-swap",
    "vertex-swarm-node/swap",
    "dep:alloy-chains",
    "dep:alloy-signer",
    "dep:alloy-signer-local",
]
# Node role: the storer settles bandwidth over SWAP, so it pulls in the chain
# stack, the on-chain chequebook client, and the swap settlement service.
# Client nodes leave this off.
storer = ["chain", "swap"]

[dependencies]
# vertex - node infrastructure
vertex-node-api.workspace = true
vertex-tasks.workspace = true

# vertex - swarm protocol
vertex-swarm-accounting.workspace = true
vertex-swarm-accounting-pricing.workspace = true
vertex-swarm-accounting-pseudosettle.workspace = true
vertex-swarm-localstore.workspace = true
vertex-swarm-peer-manager.workspace = true
vertex-swarm-peer-score.workspace = true
vertex-net-peer-store.workspace = true
vertex-storage-redb.workspace = true
vertex-swarm-redistribution.workspace = true
# The persisting reserve the storer launch path wires as the node's local store.
vertex-swarm-storer.workspace = true
# The batch store and admission validator the reserve requires for stamped admission.
vertex-swarm-postage.workspace = true
vertex-swarm-topology.workspace = true
vertex-swarm-api.workspace = true
vertex-swarm-node = { workspace = true, features = ["cli"] }
# The verified custody `Receipt` the origin upload path consumes from the client
# handle (depth check) and projects onto the public `PushReceipt`.
vertex-swarm-net-pushsync.workspace = true
vertex-swarm-identity.workspace = true
vertex-swarm-spec.workspace = true

# vertex - chain (optional, native-only, behind the `chain` feature)
vertex-chain = { workspace = true, optional = true }
# The on-chain chequebook client. Pure cheque codec by default; the builder's
# `chain` feature enables `swap-chequebook` on it to construct the SWAP
# settlement client.
vertex-swarm-accounting-chequebook = { workspace = true, optional = true }
# The chequebook settlement service (optional, behind the `swap` feature). Cheque
# exchange is chain-free; `swap` + `chain` turns on the service's `swap-chequebook`
# cashout path.
vertex-swarm-accounting-swap = { workspace = true, optional = true }

# nectar
nectar-primitives.workspace = true

# alloy
alloy-primitives.workspace = true
# chain feature: native HTTP transport (reqwest + native-tls) and the wallet
# signer built from the node Ethereum identity. native-tls (system OpenSSL) is
# used because the rustls path drags in a root-certs crate outside the workspace
# license allow-list.
alloy-provider = { workspace = true, optional = true, features = [
    "reqwest",
    "reqwest-native-tls",
] }
alloy-network = { workspace = true, optional = true }
alloy-signer = { workspace = true, optional = true }
alloy-signer-local = { workspace = true, optional = true }
alloy-chains = { workspace = true, optional = true }

# async
tokio = { workspace = true, features = ["sync"] }

# misc
async-trait.workspace = true
bytes.workspace = true
hex.workspace = true
strum.workspace = true
thiserror.workspace = true
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
tempfile = "3"
nectar-postage.workspace = true
alloy-signer.workspace = true
alloy-signer-local.workspace = true
vertex-swarm-test-utils.workspace = true
# The `CachedChunk` value the storer reserve stores and serves, exercised by the
# store-factory test.
vertex-swarm-primitives.workspace = true

# Client upload/download examples. They build a client through the public builder
# and drive the chunk sender/provider directly, the way an FFI or gRPC embedder
# would.
[[example]]
name = "upload_chunk"
path = "examples/upload_chunk.rs"

[[example]]
name = "download_chunk"
path = "examples/download_chunk.rs"
