[package]
name = "vertex-swarm-builder"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Swarm node builder infrastructure"

[lints]
workspace = true

[features]
default = []
# Construct a shared Ethereum alloy provider for chain-needing node types
# (storer, and a client with SWAP enabled). Pulls the alloy RPC stack and the
# on-chain chequebook client. Off by default to keep the default client cone
# lean. The alloy transport stack is target-split (native TLS vs browser fetch),
# so the chain code itself can build for wasm when its features are selected.
chain = [
    "dep:vertex-chain",
    "dep:vertex-chain-index",
    "dep:vertex-chain-index-framework",
    "vertex-swarm-accounting-chequebook/swap-chequebook",
    # Per-domain indexing registrations composed into the one ContractIndexer.
    "vertex-swarm-postage/chain",
    "vertex-swarm-accounting-chequebook/chain",
    "vertex-swarm-redistribution/chain",
    "dep:alloy-provider",
    "dep:alloy-network",
    "dep:alloy-signer-local",
    "dep:alloy-chains",
    # With `swap` present, also unlocks on-chain cheque cashout and the swap-oracle
    # registration; a no-op without `swap`.
    "vertex-swarm-accounting-swap?/swap-chequebook",
    "vertex-swarm-accounting-swap?/chain",
]
# SWAP cheque settlement: wires the chequebook service into accounting and routes
# swap wire events. Chain-free on its own; add `chain` for on-chain cashout. Off
# by default so the client stays the default cone.
swap = [
    "dep:vertex-swarm-accounting-swap",
    "vertex-swarm-node/swap",
    "dep:alloy-chains",
    "dep:alloy-signer",
    "dep:alloy-signer-local",
]
# Storer role: settles bandwidth over SWAP, so it pulls the chain stack and the
# swap settlement service. Clients leave this off.
storer = ["chain", "swap"]

[dependencies]
# vertex - node infrastructure
vertex-node-api.workspace = true
vertex-tasks.workspace = true

# vertex - swarm protocol
vertex-swarm-accounting.workspace = true
vertex-swarm-accounting-pricing.workspace = true
vertex-swarm-accounting-pseudosettle.workspace = true
vertex-swarm-localstore.workspace = true
# The `CachedChunk` value the cache-then-reserve serve view passes through.
vertex-swarm-primitives.workspace = true
vertex-swarm-peer-manager.workspace = true
vertex-swarm-peer-score.workspace = true
vertex-net-peer-store.workspace = true
vertex-storage-redb.workspace = true
vertex-swarm-redistribution.workspace = true
# The persisting reserve the storer launch path wires as the node's local store.
vertex-swarm-storer.workspace = true
# The neighbourhood pull-sync service the storer launch path spawns over the
# reserve, with the node providing the concrete seam impls.
vertex-swarm-puller.workspace = true
# The batch store and admission validator the reserve requires for stamped admission.
vertex-swarm-postage.workspace = true
vertex-swarm-topology.workspace = true
vertex-swarm-api.workspace = true
vertex-swarm-node = { workspace = true, features = ["cli"] }
# The verified custody `Receipt` the origin upload path consumes from the client
# handle (depth check) and projects onto the public `PushReceipt`.
vertex-swarm-net-pushsync.workspace = true
vertex-swarm-identity.workspace = true
vertex-swarm-spec.workspace = true

# vertex - chain (optional, behind the `chain` feature)
vertex-chain = { workspace = true, optional = true }
# Reorg-safe event engine and the contract-indexing framework the registrations
# compose into.
vertex-chain-index = { workspace = true, optional = true }
vertex-chain-index-framework = { workspace = true, optional = true }
# On-chain chequebook client; `chain` enables its `swap-chequebook` to build the
# SWAP settlement client.
vertex-swarm-accounting-chequebook = { workspace = true, optional = true }
# Chequebook settlement service (behind `swap`); `swap` + `chain` enables its
# cashout path.
vertex-swarm-accounting-swap = { workspace = true, optional = true }

# nectar
nectar-primitives.workspace = true

# alloy
alloy-primitives.workspace = true
# Native HTTP transport (reqwest + native-tls). native-tls (system OpenSSL) over
# rustls because the rustls path drags in a root-certs crate outside the license
# allow-list.
alloy-provider = { workspace = true, optional = true, features = [
    "reqwest",
    "reqwest-native-tls",
] }
alloy-network = { workspace = true, optional = true }
alloy-signer = { workspace = true, optional = true }
alloy-signer-local = { workspace = true, optional = true }
alloy-chains = { workspace = true, optional = true }

# async
tokio = { workspace = true, features = ["sync"] }

# misc
async-trait.workspace = true
bytes.workspace = true
hex.workspace = true
strum.workspace = true
thiserror.workspace = true
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
tempfile = "3"
nectar-postage.workspace = true
alloy-signer.workspace = true
alloy-signer-local.workspace = true
vertex-swarm-test-utils.workspace = true
# The `CachedChunk` the store-factory test exercises.
vertex-swarm-primitives.workspace = true

# Client upload/download examples driving the public builder the way an FFI or
# gRPC embedder would.
[[example]]
name = "upload_chunk"
path = "examples/upload_chunk.rs"

[[example]]
name = "download_chunk"
path = "examples/download_chunk.rs"
