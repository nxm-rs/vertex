[package]
name = "vertex-swarm-builder"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Swarm node builder infrastructure"

[lints]
workspace = true

[features]
default = []
# On-chain cashout of received cheques. SWAP is chequebook-based and so always
# needs the chain (the provider comes with `swap`); this feature adds the cashout
# path on top, so it implies `swap`. The provider construction seam and its
# target-split transport (native TLS vs browser fetch) live in `vertex-chain`
# behind its `provider` feature. Off by default to keep the default client cone lean.
chain = [
    "swap",
    "vertex-chain/provider",
    "vertex-swarm-node/swap-chequebook",
]
# SWAP cheque-based settlement. The swap settlement service and its accounting
# wiring live in `vertex-swarm-node`; this feature turns them on there. SWAP is
# chequebook-based, so it pulls the chain provider; a swap-enabled client hard-fails
# without a resolvable chain. Pseudosettle is the chain-free settlement path.
# Combine with `chain` to also cash received cheques on chain. Off by default so the
# default client node stays the chain-free cone.
swap = ["vertex-swarm-node/swap"]
# The storer code cone: the persisting reserve, the neighbourhood puller, the
# batch store, and the redistribution config, plus the storer node module in
# `vertex-swarm-node`. Pulling this keeps the storer builders, configs and launch
# path out of the default client build. It carries no chain or settlement on its
# own; the role feature below adds those. Named for the storer's defining
# commitment: holding a reserve.
reserve = [
    "dep:vertex-swarm-storer",
    "dep:vertex-swarm-puller",
    "dep:vertex-swarm-postage",
    "dep:vertex-swarm-redistribution",
    "vertex-swarm-node/storer",
]
# Node role: the storer settles bandwidth over SWAP, so it pulls in the reserve
# cone plus the chain stack, the on-chain chequebook client, and the swap
# settlement service. Client nodes leave this off.
storer = ["reserve", "chain", "swap"]

[dependencies]
# vertex - node infrastructure
vertex-node-api.workspace = true
vertex-tasks.workspace = true

# vertex - swarm protocol
vertex-swarm-accounting.workspace = true
vertex-swarm-accounting-pricing.workspace = true
vertex-swarm-accounting-pseudosettle.workspace = true
vertex-swarm-localstore.workspace = true
# The `CachedChunk` value the cache-then-reserve serve view passes through.
vertex-swarm-primitives.workspace = true
vertex-swarm-peer-manager.workspace = true
vertex-swarm-peer-score.workspace = true
vertex-net-peer-store.workspace = true
vertex-storage-redb.workspace = true
# The storer cone (behind `reserve`): the redistribution config, the
# persisting reserve, the neighbourhood pull-sync service, and the batch store and
# admission validator the reserve requires for stamped admission. Optional so the
# default client build never compiles them.
vertex-swarm-redistribution = { workspace = true, optional = true }
vertex-swarm-storer = { workspace = true, optional = true }
vertex-swarm-puller = { workspace = true, optional = true }
vertex-swarm-postage = { workspace = true, optional = true }
vertex-swarm-topology.workspace = true
vertex-swarm-api.workspace = true
# The gRPC serve view (`GrpcAdapter`) the Swarm protocol projects its components
# into for transport registration. Lives below the builder so the orphan-rule
# `RegistersGrpcServices` impls stay with the local newtype.
vertex-swarm-rpc.workspace = true
vertex-swarm-node = { workspace = true, features = ["cli"] }
# The verified custody `Receipt` the origin upload path consumes from the client
# handle (depth check) and projects onto the public `PushReceipt`.
vertex-swarm-net-pushsync.workspace = true
vertex-swarm-identity.workspace = true
vertex-swarm-spec.workspace = true

# vertex - chain (behind the `chain` feature, which enables its `provider`
# feature for the construction seam and target-split transport). The launch path
# builds the provider here and hands it to the node's swap wiring for on-chain
# cashout.
vertex-chain = { workspace = true, optional = true }

# nectar
nectar-primitives.workspace = true

# alloy
alloy-primitives.workspace = true

# async
tokio = { workspace = true, features = ["sync"] }

# misc
async-trait.workspace = true
bytes.workspace = true
hex.workspace = true
strum.workspace = true
thiserror.workspace = true
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
tempfile = "3"
nectar-postage.workspace = true
alloy-signer.workspace = true
alloy-signer-local.workspace = true
vertex-swarm-test-utils.workspace = true
# The examples launch through the node-builder shell; metrics-free is fine since
# they use `launch_without_grpc`.
vertex-node-builder.workspace = true
vertex-node-core.workspace = true

# Client upload/download examples. They launch a client through the node-builder
# shell and drive the chunk sender/provider directly, the way an FFI or gRPC
# embedder would.
[[example]]
name = "upload_chunk"
path = "examples/upload_chunk.rs"

[[example]]
name = "download_chunk"
path = "examples/download_chunk.rs"
