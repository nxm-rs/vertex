[package]
name = "vertex-swarm-accounting-chequebook"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Chequebook types and signing for SWAP settlement"

[lints]
workspace = true

[features]
# Default is a pure, wasm-safe cheque codec with no RPC stack, so client nodes
# compile without an Ethereum provider.
default = []
# `swap-chequebook` adds the native on-chain chequebook client over a shared
# alloy provider. It is off by default; a node role that settles over SWAP (the
# storer) turns it on. It enables an HTTP transport with native-tls: the rustls
# path drags in a platform root-certs crate under a license outside the
# workspace allow-list, so the HTTP transport uses native-tls (system OpenSSL).
swap-chequebook = [
    "dep:vertex-chain",
    "dep:alloy-contract",
    "dep:alloy-provider",
    "dep:alloy-network",
    "dep:tracing",
]

[dependencies]
# nectar
nectar-contracts = { workspace = true }

# alloy
# `k256` enables secp256k1 signature recovery, which the cheque codec needs to
# recover the signer of a cheque without pulling a full signer crate. `serde`
# enables the address and integer serde impls the wire codec derives.
alloy-chains = { workspace = true }
alloy-primitives = { workspace = true, features = ["k256", "serde"] }
alloy-sol-types = { workspace = true }

# swap-chequebook feature: the on-chain chequebook client over a shared alloy
# provider, using `alloy-contract` `CallBuilder`s over the `nectar-contracts`
# `sol!` interfaces.
vertex-chain = { workspace = true, optional = true }
alloy-contract = { workspace = true, optional = true }
alloy-network = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }

# misc
bytes = { workspace = true }
thiserror.workspace = true
strum = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_with = { workspace = true, features = ["base64"] }
serde_json = { workspace = true }

# Native uses the reqwest transport with native-tls (system OpenSSL).
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
alloy-provider = { workspace = true, optional = true, features = [
    "reqwest",
    "reqwest-native-tls",
] }

# On wasm, the secp256k1 backend pulled in by `alloy-primitives/k256` reaches
# `getrandom`, which needs its browser backend selected explicitly. This is a
# transitive build requirement, not a direct API use.
#
# The reqwest transport on wasm uses the browser fetch backend, which does TLS
# through the browser, so no `*-tls` feature is selected.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { workspace = true, features = ["js"] }
alloy-provider = { workspace = true, optional = true, features = ["reqwest"] }

[dev-dependencies]
alloy-signer = { workspace = true }
alloy-signer-local = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
