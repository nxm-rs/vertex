[package]
name = "vertex-swarm-bandwidth"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Core bandwidth accounting for Swarm data availability"

[dependencies]
nectar-primitives = { workspace = true, features = ["serde"] }
vertex-swarm-primitives = { workspace = true }
vertex-metrics = { workspace = true }
vertex-swarm-api = { workspace = true }
vertex-swarm-bandwidth-pricing = { workspace = true, features = ["cli"] }
vertex-swarm-spec = { workspace = true }
vertex-storage = { workspace = true, optional = true, features = ["nectar"] }
async-trait = { workspace = true }
auto_impl = { workspace = true }
clap = { workspace = true, features = ["derive"] }
dashmap = { workspace = true, optional = true }
metrics = { workspace = true }
portable-atomic = { workspace = true }
serde = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true, optional = true }

[dev-dependencies]
postcard = { workspace = true }
vertex-storage-redb = { workspace = true }
vertex-swarm-test-utils = { workspace = true }

[features]
default = ["std"]
std = ["dashmap", "vertex-storage", "tracing"]
