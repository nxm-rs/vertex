[package]
name = "vertex-swarm-topology"
description = "Topology behaviour and Kademlia routing for Swarm peer management"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
## vertex
vertex-swarm-primitives.workspace = true
vertex-swarm-api.workspace = true
vertex-observability.workspace = true
vertex-swarm-identity.workspace = true
vertex-swarm-spec.workspace = true
vertex-net-local.workspace = true
vertex-net-handshake.workspace = true
vertex-net-headers.workspace = true
vertex-net-hive.workspace = true
vertex-net-pingpong.workspace = true
vertex-swarm-peer.workspace = true
vertex-swarm-peer-manager.workspace = true
vertex-swarm-peer-registry.workspace = true
vertex-tasks.workspace = true
nectar-primitives.workspace = true

## p2p
libp2p.workspace = true

## async
futures.workspace = true
tokio.workspace = true

## crypto/primitives
alloy-primitives.workspace = true
bytes.workspace = true

## misc
thiserror.workspace = true
rand.workspace = true
parking_lot.workspace = true
hashlink.workspace = true
web-time.workspace = true
hex = "0.4"

## CLI args (optional, for RoutingArgs)
clap.workspace = true
serde.workspace = true

## tracing & metrics
tracing.workspace = true
metrics.workspace = true

# DNS resolution (for bootnode dnsaddr resolution)
hickory-resolver = { version = "0.25", features = ["tokio", "system-config"] }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros", "time"] }
tracing-subscriber.workspace = true
vertex-swarm-test-utils = { workspace = true }

[lints]
workspace = true
