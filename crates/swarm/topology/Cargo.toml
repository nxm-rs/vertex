[package]
name = "vertex-swarm-topology"
description = "Topology behaviour and Kademlia routing for Swarm peer management"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
## vertex
# Topology only uses the platform-neutral metric primitives (recording macros,
# timing guards, bucket presets), all of which live in the `vertex-metrics`
# leaf, so it never pulls the native server stack and stays wasm-buildable.
vertex-metrics.workspace = true
vertex-swarm-primitives.workspace = true
vertex-swarm-api.workspace = true
vertex-net-local.workspace = true
vertex-net-ratelimiter.workspace = true
vertex-net-utils.workspace = true
vertex-net-peer-store.workspace = true
vertex-tasks.workspace = true
vertex-util-runtime.workspace = true
vertex-swarm-net-handshake.workspace = true
vertex-swarm-net-identify.workspace = true
vertex-swarm-net-headers.workspace = true
vertex-swarm-net-hive.workspace = true
vertex-swarm-peer.workspace = true
vertex-swarm-peer-manager.workspace = true
vertex-net-peer-registry.workspace = true
vertex-swarm-peer-score.workspace = true
nectar-primitives.workspace = true

## p2p
# The native dial tracker speaks libp2p `Multiaddr`/`PeerId`/`ConnectionId`
# vocabulary only; it builds on both targets with the trimmed wasm libp2p.
vertex-net-dialer.workspace = true

## async
futures.workspace = true
# Topology drives timers (`tokio::time`) and channels (`tokio::sync`) and uses
# `tokio::select!`. None of `net`, `rt-multi-thread`, `fs`, or `signal` is
# needed, so the wasm build stays clean.
tokio = { workspace = true, features = ["sync", "time", "macros"] }

## crypto/primitives
alloy-primitives.workspace = true
bytes.workspace = true

## misc
thiserror.workspace = true
rand.workspace = true
parking_lot.workspace = true
hashlink.workspace = true
strum.workspace = true
hex = "0.4"

## CLI args (optional, for RoutingArgs)
clap.workspace = true
serde.workspace = true

## tracing & metrics
tracing.workspace = true
metrics.workspace = true

# Native transport (tcp/dns/mdns/upnp/autonat) plus the netdev interface watcher
# and system-DNS bootnode resolution. The browser client dials over a websocket
# transport selected in `vertex-swarm-node`, has no netdev to watch, and
# resolves `/dnsaddr/` bootnodes over DNS-over-HTTPS instead.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libp2p.workspace = true
if-watch.workspace = true
vertex-net-dnsaddr.workspace = true

# Browser build: a trimmed libp2p with only the wire-protocol and crypto
# features the topology behaviour composes, mirroring the wasm libp2p in
# `vertex-swarm-node`. Bootnode `/dnsaddr/` resolution goes through
# `vertex-net-dnsaddr-doh` (DNS-over-HTTPS) with the embedded wss snapshot as
# the fallback.
[target.'cfg(target_arch = "wasm32")'.dependencies]
libp2p = { git = "https://github.com/nxm-rs/rust-libp2p", rev = "6454fdf3450f91fdbb6e3306daa7a9a4e633c133", default-features = false, features = [
    "noise",
    "yamux",
    "macros",
    "ecdsa",
    "identify",
    "ping",
] }
vertex-net-dnsaddr-doh.workspace = true
# The embedded wss bootnode snapshot is the DoH fallback for the browser client.
vertex-swarm-spec.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros", "time", "test-util"] }
vertex-swarm-identity.workspace = true
vertex-swarm-spec.workspace = true
tracing-subscriber.workspace = true
vertex-swarm-peer = { workspace = true, features = ["test-utils"] }
vertex-swarm-test-utils = { workspace = true }
criterion.workspace = true

[[bench]]
name = "topology_benchmarks"
harness = false

[lints]
workspace = true
