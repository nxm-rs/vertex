[package]
name = "vertex-swarm-net-headers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
## vertex
vertex-metrics.workspace = true
vertex-net-codec.workspace = true
vertex-swarm-net-proto.workspace = true
vertex-swarm-primitives.workspace = true
vertex-util-runtime.workspace = true

## async
futures.workspace = true

## p2p
asynchronous-codec.workspace = true
quick-protobuf.workspace = true
quick-protobuf-codec.workspace = true
libp2p.workspace = true

## metrics
metrics.workspace = true

## misc
bytes.workspace = true
strum.workspace = true
thiserror.workspace = true

## tracing
tracing.workspace = true

## telemetry (native only)
# W3C trace-context propagation is native-only: the browser client has no OTLP
# backend to propagate to, so the wasm sibling (`tracing_wasm.rs`) provides no-op
# inject/extract. Keeping these off the wasm cone avoids dragging the
# OpenTelemetry stack into the browser build.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tracing-opentelemetry.workspace = true
opentelemetry.workspace = true
