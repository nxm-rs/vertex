syntax = "proto3";

package handshake;

// Bee handshake 15.0.0 wire format (matches bee
// `pkg/p2p/libp2p/internal/handshake/pb/handshake.proto`).

message Syn {
  bytes observed_multiaddr = 1;
}

message Ack {
  SwarmPeer address = 1;
  uint64 network_id = 2;
  bool storer = 3;
  string welcome_message = 99;
}

message SynAck {
  Syn syn = 1;
  Ack ack = 2;
}

// SwarmPeer is the bee 15.0.0 signed peer record. Field numbers match
// bee's BzzAddress proto so that vertex bootnodes interoperate with bee
// mainnet on the wire (proto3 wire format keys on field numbers, not
// names).
message SwarmPeer {
  bytes multiaddrs = 1;
  bytes signature = 2;
  bytes overlay = 3;
  bytes nonce = 4;
  int64 timestamp = 5;
  bytes chequebook_address = 6;
}
