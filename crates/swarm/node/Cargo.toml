[package]
name = "vertex-swarm-node"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Swarm node implementation with libp2p integration"

[lints]
workspace = true

[dependencies]
## nectar
nectar-primitives.workspace = true

## vertex - primitives
vertex-swarm-primitives.workspace = true

## vertex - network (libp2p layer)
vertex-swarm-net-identify.workspace = true
vertex-swarm-net-pricing.workspace = true

## vertex - identity
vertex-swarm-peer.workspace = true
vertex-swarm-net-pushsync.workspace = true
vertex-swarm-net-retrieval.workspace = true

## vertex - settlement (optional, feature-gated)
vertex-swarm-net-swap = { workspace = true, optional = true }
# The swap settlement service and provider the client launch path wires behind
# the `swap` feature. Cheque exchange is chain-free; `swap-chequebook` turns on
# the service's on-chain cashout path.
vertex-swarm-accounting-swap = { workspace = true, optional = true }
# The chain provider and contract address book the on-chain cashout consumes,
# behind `swap-chequebook`.
vertex-chain = { workspace = true, optional = true }

## vertex - topology
vertex-swarm-topology.workspace = true
vertex-swarm-peer-manager.workspace = true
vertex-swarm-peer-score.workspace = true

## vertex - net utilities
vertex-net-local.workspace = true
vertex-net-ratelimiter.workspace = true

## vertex - swarm (libp2p-free abstractions)
vertex-swarm-api.workspace = true
vertex-swarm-client-behaviour.workspace = true
vertex-swarm-client-protocol.workspace = true
vertex-swarm-identity.workspace = true
vertex-swarm-localstore.workspace = true
vertex-swarm-spec.workspace = true

## vertex - infrastructure
vertex-swarm-accounting.workspace = true
vertex-swarm-accounting-pseudosettle.workspace = true
vertex-tasks.workspace = true
vertex-util-runtime.workspace = true

## crypto
alloy-primitives.workspace = true
# The storer pushsync ingest path erases the identity's signer to `dyn SignerSync`
# to sign custody receipts.
alloy-signer.workspace = true
# SWAP settlement wiring (optional, behind the `swap` feature): the named
# settlement chain and the node identity's signer the swap service issues cheques
# with.
alloy-chains = { workspace = true, optional = true }
alloy-signer-local = { workspace = true, optional = true }

## async
async-trait.workspace = true
futures.workspace = true
futures-bounded = "0.2"
# Used for the retrieval fan-out stagger. The workspace pin enables the
# `wasm-bindgen` feature so the browser build uses the browser clock instead
# of the std clock, which panics on wasm32; the same feature unification keeps
# libp2p's connection-handler delays working on wasm.
futures-timer.workspace = true
tokio = { workspace = true, features = ["sync"] }

## observability
metrics.workspace = true
vertex-net-peer-store.workspace = true

## misc
auto_impl.workspace = true
bytes.workspace = true
eyre.workspace = true
parking_lot.workspace = true
strum.workspace = true
thiserror.workspace = true
tracing.workspace = true

## cli (optional)
clap = { workspace = true, features = ["derive", "env"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
vertex-node-api = { workspace = true, optional = true }
vertex-swarm-accounting-pricing = { workspace = true, optional = true, features = ["cli"] }
vertex-swarm-redistribution = { workspace = true, optional = true }

# p2p: the native transport pulls tcp/dns/mdns/upnp/autonat; the browser build
# trims to the wire-protocol features and dials over a websocket transport.
#
# The storer protocol tier (pullsync syncer and puller) is native-only: the
# storer node module is `cfg(not(wasm32))`, so these stay out of the wasm client
# cone.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libp2p.workspace = true
vertex-swarm-storer-behaviour.workspace = true
vertex-swarm-puller.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
libp2p = { git = "https://github.com/nxm-rs/rust-libp2p", rev = "6454fdf3450f91fdbb6e3306daa7a9a4e633c133", default-features = false, features = [
    "noise",
    "yamux",
    "macros",
    "ecdsa",
    "identify",
    "ping",
] }
libp2p-websocket-websys.workspace = true

[dev-dependencies]
nectar-postage.workspace = true
alloy-signer-local.workspace = true

# Native test harness: the multi-thread runtime, the cluster rig (which spawns
# `!Send` node futures), the behaviour test rig, and the tracing subscriber are
# native-only and would drag native-only transitive crates (mio, errno) into the
# wasm test build, so they stay off wasm32.
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "time", "sync"] }
vertex-swarm-test-utils = { workspace = true, features = ["cluster"] }
vertex-swarm-topology.workspace = true
eyre.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
libp2p-swarm-test.workspace = true
rand_08.workspace = true

# Wasm test harness: the network-free identity fixtures plus the bindgen runner.
# `vertex-storage-indexeddb` opens the database the IndexedDB cache test mirrors
# through; it builds empty off wasm32, so it is wasm-only here.
[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
vertex-swarm-test-utils.workspace = true
vertex-storage-indexeddb.workspace = true
wasm-bindgen-test.workspace = true

[features]
default = ["std"]
std = []
# SWAP cheque-based settlement. Pulls the swap wire protocol and surfaces
# `SwapEvent` plus the `ClientCommand::SendCheque` variant for a settlement
# service to consume, and wires the swap settlement service into the client core.
# Chain-free on its own: cheque exchange needs no chain. Combine with
# `swap-chequebook` for on-chain cashout of received cheques.
swap = [
    "dep:vertex-swarm-net-swap",
    "dep:vertex-swarm-accounting-swap",
    "dep:alloy-chains",
    "dep:alloy-signer-local",
    "vertex-swarm-client-behaviour/swap",
    "vertex-swarm-client-protocol/swap",
]
# On-chain cashout of received cheques over a shared alloy provider. Off by
# default so the cheque-exchange path stays chain-free and wasm-friendly.
swap-chequebook = [
    "swap",
    "vertex-chain/provider",
    "vertex-swarm-accounting-swap/swap-chequebook",
]
cli = [
    "dep:clap",
    "dep:serde",
    "dep:vertex-node-api",
    "dep:vertex-swarm-accounting-pricing",
    "dep:vertex-swarm-redistribution",
    "vertex-swarm-localstore/cli",
    "vertex-swarm-primitives/serde",
    "alloy-primitives/serde",
]
# Browser-only IndexedDB cache backend for the embedded client. Test-facing on
# the node crate: it enables the localstore backend so the wasm acceptance test
# can round-trip a chunk through the persisted store. The launcher itself takes
# any `SwarmLocalStore` through `with_store`, so the node crate needs no backend
# code of its own.
indexeddb = ["vertex-swarm-localstore/indexeddb"]
