[package]
name = "vertex-swarm-primitives"
description = "Core primitive types for Ethereum Swarm nodes"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
nectar-primitives = { workspace = true }
nectar-postage = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"], optional = true }

# On wasm, nectar-primitives leaves the alloy-primitives `getrandom` feature
# unselected even though its nonce generation calls `B256::random()`. Select
# it here, together with the browser backend of the getrandom crate, so the
# wasm cone resolves a working entropy source. These are transitive build
# requirements, not direct API uses.
[target.'cfg(target_arch = "wasm32")'.dependencies]
alloy-primitives = { workspace = true, features = ["getrandom"] }
getrandom = { workspace = true, features = ["js"] }
getrandom_04 = { workspace = true, features = ["wasm_js"] }

[dev-dependencies]
alloy-primitives = { workspace = true }
alloy-signer-local = { workspace = true }

[features]
default = ["std"]
std = ["nectar-primitives/std", "nectar-postage/std"]
serde = ["dep:serde", "nectar-postage/serde"]
