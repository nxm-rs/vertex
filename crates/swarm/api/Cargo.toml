[package]
name = "vertex-swarm-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
# Internal dependencies
nectar-primitives = { workspace = true }
nectar-swarms = { workspace = true }
vertex-node-api = { workspace = true }
vertex-swarm-forks = { workspace = true }
vertex-swarm-primitives = { workspace = true }
vertex-tasks = { workspace = true }

# Alloy. `k256` enables secp256k1 public-key recovery, used to recover the
# signer overlay of a pushsync custody receipt (`recover_receipt_signer`).
alloy-chains = { workspace = true }
alloy-primitives = { workspace = true, features = ["k256"] }
alloy-signer = { workspace = true }

# External dependencies
auto_impl = "1.1"
bytes = { workspace = true }
derive_more = { workspace = true }
eyre = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
libp2p = { workspace = true }
paste = { workspace = true }
metrics = { workspace = true }
vertex-metrics = { workspace = true }
thiserror = { workspace = true }
async-trait = "0.1"
tracing = { workspace = true }
strum = { workspace = true }

# Optional serde support
serde = { workspace = true, features = ["derive"], optional = true }

[dev-dependencies]
# Receipt-depth verification tests sign real custody receipts.
alloy-signer = { workspace = true }
alloy-signer-local = { workspace = true }

[features]
default = ["std"]
std = []
serde = ["dep:serde", "vertex-swarm-primitives/serde"]
