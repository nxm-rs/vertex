syntax = "proto3";
package vertex.swarm.chunk.v1;

// Chunk service: chunk retrieval, upload, and existence checks against Swarm.
service Chunk {
  // RetrieveChunk retrieves a single chunk by its address.
  rpc RetrieveChunk(RetrieveChunkRequest) returns (RetrieveChunkResponse);

  // HasChunk checks if a chunk exists locally.
  rpc HasChunk(HasChunkRequest) returns (HasChunkResponse);

  // UploadChunk pushes a single pre-stamped chunk via PushSync.
  rpc UploadChunk(UploadChunkRequest) returns (UploadChunkResponse);

  // UploadChunks streams pre-stamped chunks, bounded by chunk count. Receipts
  // may return in any order: each carries its chunk address, so the client owns
  // ordering and one slow push never blocks the rest.
  rpc UploadChunks(stream UploadChunkRequest) returns (stream UploadChunkResponse);

  // RetrieveChunks streams chunks by address, bounded by chunk count. Responses
  // may return in any order: each carries its address, so the client correlates
  // and reorders.
  rpc RetrieveChunks(stream RetrieveChunkRequest) returns (stream RetrieveChunkResponse);

  // HasChunks streams existence checks; each response carries its address.
  rpc HasChunks(stream HasChunkRequest) returns (stream HasChunkResponse);
}

// ChunkType identifies how the chunk data is reconstructed on upload.
enum ChunkType {
  // Content-addressed chunk (CAC): the address is the BMT hash of the data.
  CHUNK_TYPE_CONTENT = 0;

  // Single-owner chunk (SOC): the data carries id, signature, and BMT body.
  CHUNK_TYPE_SINGLE_OWNER = 1;
}

// Failure pertaining to one address, carried in place of a result so a streamed
// item never tears down the whole stream.
message ChunkError {
  bytes address = 1;
  string message = 2;
}

message RetrieveChunkRequest {
  bytes address = 1;
}

// A retrieved, address-validated chunk.
message RetrievedChunk {
  bytes address = 1;
  bytes data = 2;
  // Postage stamp; empty when the serving peer omitted it (chunk still valid).
  bytes stamp = 3;
  // Overlay of the peer that served the chunk; empty when unknown.
  bytes served_by = 4;
}

message RetrieveChunkResponse {
  oneof result {
    RetrievedChunk chunk = 1;
    ChunkError error = 2;
  }
}

message HasChunkRequest {
  bytes address = 1;
}

message HasChunkResponse {
  bytes address = 1;
  bool exists = 2;
}

message UploadChunkRequest {
  // The chunk payload: for a content chunk the BMT body (span + data); for a
  // single-owner chunk the full wire encoding (id + signature + BMT body).
  bytes data = 1;
  // Pre-computed postage stamp.
  bytes stamp = 2;
  bytes address = 3;
  ChunkType chunk_type = 4;
  // Validate the stamp signature before forwarding (pre-stamped uploads are
  // trusted by default).
  bool validate = 5;
}

// The storer's signed acknowledgement of an accepted chunk.
message UploadReceipt {
  bytes address = 1;
  // Overlay of the storer that accepted the chunk.
  bytes storer = 2;
  // Signature over the receipt (65 bytes).
  bytes signature = 3;
  // Nonce the storer used when signing (32 bytes).
  bytes nonce = 4;
  uint32 storage_radius = 5;
}

message UploadChunkResponse {
  oneof result {
    UploadReceipt receipt = 1;
    ChunkError error = 2;
  }
}
