[package]
name = "vertex-swarm-storer"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Storer node storage implementation with LocalStore and ChunkSync"

[lints]
workspace = true

[dependencies]
## vertex
alloy-primitives.workspace = true
nectar-postage.workspace = true
nectar-primitives = { workspace = true, features = ["serde"] }
vertex-metrics.workspace = true
vertex-storage = { workspace = true, features = ["nectar"] }
vertex-swarm-primitives.workspace = true
vertex-swarm-api.workspace = true

## async
async-trait.workspace = true
tokio = { workspace = true, features = ["sync"] }

## caching
hashlink.workspace = true

## metrics
metrics.workspace = true

## misc
parking_lot.workspace = true
serde = { workspace = true, features = ["derive"] }
strum.workspace = true
thiserror.workspace = true
tracing.workspace = true

[dev-dependencies]
alloy-primitives.workspace = true
nectar-postage.workspace = true
tempfile = "3"
tokio = { workspace = true, features = ["rt", "macros"] }
vertex-storage-redb.workspace = true
vertex-swarm-test-utils.workspace = true

[features]
default = ["std"]
std = []
