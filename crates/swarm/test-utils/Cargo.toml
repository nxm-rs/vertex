[package]
name = "vertex-swarm-test-utils"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Test utilities and mocks for vertex-swarm crates"

[lints]
workspace = true

[dependencies]
# Swarm dependencies
vertex-swarm-api.workspace = true
vertex-swarm-primitives.workspace = true
vertex-swarm-spec.workspace = true
vertex-swarm-identity.workspace = true
vertex-swarm-peer = { workspace = true, features = ["test-utils"] }
nectar-primitives.workspace = true

# Crypto/signing
alloy-primitives.workspace = true
alloy-signer.workspace = true
alloy-signer-local.workspace = true

# libp2p (for PeerId generation)
libp2p.workspace = true

# Utilities
rand.workspace = true
parking_lot.workspace = true

# Cluster harness (gated by the `cluster` feature)
vertex-swarm-node = { workspace = true, optional = true }
vertex-swarm-topology = { workspace = true, optional = true }
vertex-tasks = { workspace = true, optional = true }
tokio = { workspace = true, optional = true, features = ["sync", "rt", "macros"] }
eyre = { workspace = true, optional = true }

[features]
default = []
# In-process multi-node cluster harness. Pulls in `vertex-swarm-node` and a
# tokio runtime, so it's gated to keep crate-local tests of leaf primitives
# fast and dependency-light.
cluster = [
    "dep:vertex-swarm-node",
    "dep:vertex-swarm-topology",
    "dep:vertex-tasks",
    "dep:tokio",
    "dep:eyre",
]
