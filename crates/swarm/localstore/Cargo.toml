[package]
name = "vertex-swarm-localstore"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Swarm client chunk cache and local store configuration"

[lints]
workspace = true

[dependencies]
# vertex
vertex-swarm-api.workspace = true
vertex-swarm-primitives.workspace = true
vertex-store.workspace = true
vertex-util-runtime.workspace = true

# nectar
nectar-primitives.workspace = true
nectar-postage.workspace = true

# cli (optional: the byte-bounded cache itself needs neither clap nor serde)
clap = { workspace = true, features = ["derive"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }

# The IndexedDB-mirroring backend is browser-only; the storage trait and its
# IndexedDB backend are pulled only on wasm32 under the `indexeddb` feature.
[target.'cfg(target_arch = "wasm32")'.dependencies]
vertex-storage = { workspace = true, optional = true }
vertex-storage-indexeddb = { workspace = true, optional = true }

[dev-dependencies]
alloy-primitives.workspace = true
alloy-signer-local.workspace = true

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test.workspace = true

[features]
default = []
# CLI argument parsing for the local store config (`LocalStoreArgs`). Pulls
# clap and serde; the cache wrapper is available without it, which keeps the
# wasm client cone free of the CLI dependencies.
cli = ["dep:clap", "dep:serde"]
# IndexedDB-backed cache backend for the browser client. Browser-only: the code
# is also gated on `cfg(target_arch = "wasm32")`, so the native build ignores it.
indexeddb = ["dep:vertex-storage", "dep:vertex-storage-indexeddb", "dep:serde"]
