[package]
name = "vertex-swarm-peer-manager"
description = "Peer lifecycle management with PeerId/OverlayAddress abstraction boundary"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
# Network primitives
vertex-net-local = { workspace = true }
vertex-net-peer-store = { workspace = true }
vertex-net-peer-score = { workspace = true }

# Swarm-specific
vertex-swarm-api = { workspace = true }
vertex-swarm-primitives = { workspace = true }
vertex-swarm-peer = { workspace = true, features = ["serde"] }
vertex-swarm-peer-score = { workspace = true }

# Core
libp2p = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { version = "1.0", features = ["std"] }
thiserror = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros", "time"] }
tempfile = "3"
vertex-swarm-test-utils = { workspace = true }
