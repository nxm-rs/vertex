[package]
name = "vertex-swarm-peer-manager"
description = "Peer lifecycle management with PeerId/OverlayAddress abstraction boundary"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
# Network primitives
vertex-net-local = { workspace = true }
vertex-net-peer-backoff = { workspace = true }
vertex-net-peer-registry = { workspace = true }
vertex-net-peer-store = { workspace = true }

# Swarm-specific
vertex-swarm-api = { workspace = true }
vertex-swarm-primitives = { workspace = true }
vertex-swarm-peer = { workspace = true, features = ["serde"] }
vertex-swarm-peer-score = { workspace = true }

# Tasks
vertex-tasks = { workspace = true }

# Observability
metrics = { workspace = true }

# Storage
vertex-storage = { workspace = true, features = ["nectar", "alloy"] }

# Core
parking_lot = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true, features = ["derive"] }
strum = { workspace = true }
thiserror = { workspace = true }
# std::time re-export on native, browser clock on wasm32.
web-time = { workspace = true }

# Concurrency
dashmap = { workspace = true }
hashlink = { workspace = true }
tokio = { workspace = true, features = ["sync"] }

[dev-dependencies]
vertex-net-peer-store = { workspace = true, features = ["test-utils"] }
postcard = { workspace = true }
vertex-swarm-peer = { workspace = true, features = ["serde", "test-utils"] }
vertex-swarm-test-utils = { workspace = true }
vertex-storage-redb = { workspace = true }
