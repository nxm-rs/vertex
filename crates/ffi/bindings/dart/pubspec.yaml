# Minimal Dart package wrapping the generated vertex_ffi bindings.
#
# flutter_rust_bridge_codegen requires its Dart output to live inside a Dart
# package; this pubspec is that package. The generated code under lib/ is
# produced by the codegen (see ../../flutter_rust_bridge.yaml), never edited by
# hand. The flutter_rust_bridge version pins the codegen version the workspace
# Cargo.toml pins for the Rust runtime. freezed backs the sealed-class form of
# data-carrying enums (FfiError); a consuming host runs `dart run build_runner
# build` to materialize the .freezed.dart parts.
name: vertex_ffi
description: Dart bindings for embedding a Vertex Swarm client.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.3.0

dependencies:
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^2.4.0
  meta: ^1.11.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^2.5.0
