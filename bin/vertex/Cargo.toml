[package]
name = "vertex"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Vertex Swarm node binary"
build = "build.rs"

[[bin]]
name = "vertex"
path = "src/main.rs"

[features]
# The default binary is a bare client: it compiles neither the storer code cone
# nor the chain or swap stacks. The cone guard (`just check-cone`) enforces that
# the default cone never resolves the storer crates or chain code.
default = []
# Construct a shared native Ethereum alloy provider for chain-needing node
# types. Off by default: the default binary is the light, chain-free build.
chain = ["vertex-swarm-builder/chain"]
# SWAP cheque-based settlement. Wires the chequebook settlement service into the
# accounting and surfaces the `--swap` flags. Chain-free on its own (cheque
# exchange needs no chain); combine with `chain` for on-chain cashout. Off by
# default so the default binary stays swap-free and chain-free.
swap = ["vertex-swarm-builder/swap"]
# The full storer node. Compiles the storer code cone (reserve, puller, batch
# store, redistribution, the `StorerNode` composite) and turns the chain stack,
# the on-chain chequebook client, and the swap settlement service on. Selected by
# intent for the storer build; the default binary leaves it off and refuses to
# launch a storer at runtime.
storer = ["vertex-swarm-builder/storer", "vertex-swarm-node/storer"]
# Heap-profile sampling on top of jemalloc. jemalloc is the default allocator on
# the supported platforms (Linux and macOS) via the target-gated dependency
# block below, so this only adds the profiling instrumentation. Unix-only: there
# is no jemalloc to profile on Windows or wasm.
heap-profiling = ["tikv-jemallocator/profiling", "vertex-observability/heap-profiling"]
profiling = ["vertex-observability/profiling"]
tokio-console = ["console-subscriber", "vertex-observability/tokio-console", "tokio/tracing"]

[dependencies]
# vertex - node infrastructure
# The binary installs the metrics server and tracing, so it needs the full
# native stack via the `host` umbrella.
vertex-observability = { workspace = true, features = ["host"] }
vertex-node-api.workspace = true
# The binary serves metrics, so it opts the shell back into the metrics stage
# (the workspace pins the dependency metrics-free for the embedded FFI client).
vertex-node-builder = { workspace = true, features = ["metrics"] }
vertex-node-commands.workspace = true
vertex-node-core.workspace = true
vertex-tasks.workspace = true

# vertex - storage
vertex-storage-redb.workspace = true

# vertex - swarm protocol
vertex-swarm-api.workspace = true
vertex-swarm-accounting.workspace = true
vertex-swarm-builder.workspace = true
vertex-swarm-node = { workspace = true, features = ["cli"] }
vertex-swarm-identity.workspace = true
vertex-swarm-net-handshake.workspace = true
vertex-swarm-net-headers.workspace = true
vertex-swarm-net-hive.workspace = true
vertex-swarm-net-identify.workspace = true
vertex-swarm-peer-manager.workspace = true
vertex-swarm-primitives.workspace = true
vertex-swarm-spec.workspace = true
vertex-swarm-topology.workspace = true

# alloy
alloy-primitives.workspace = true

# misc
clap.workspace = true
eyre.workspace = true
rand.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true

# profiling (optional)
console-subscriber = { workspace = true, optional = true }

# jemalloc is the default global allocator on every platform that supports it: a
# long-running node sees lower RSS and better fragmentation handling than the
# system allocator. Excluded on Windows (tikv-jemallocator has no msvc support)
# and wasm, which fall back to the system allocator. This is a platform default,
# not a cargo feature, so it needs no opt-in and the cross-platform release still
# builds. The observability and node-builder jemalloc slices ride along to add
# the allocator metrics; cargo unions these features with the base deps above.
[target.'cfg(all(not(target_os = "windows"), not(target_arch = "wasm32")))'.dependencies]
tikv-jemallocator = { workspace = true }
vertex-observability = { workspace = true, features = ["jemalloc"] }
vertex-node-builder = { workspace = true, features = ["jemalloc"] }

[dev-dependencies]
tempfile = "3"

[build-dependencies]
vergen-gitcl = { workspace = true }
