# Browser wasm demo: an ephemeral Swarm client node that dials live mainnet over
# secure websockets and renders its Kademlia topology building up.
#
# This crate is wasm-only (`cdylib`) and is intentionally NOT a member of the
# workspace `[workspace] members`: it depends on the wasm-only client launch
# path and never builds for native, so adding it to the default workspace would
# break `cargo build` on native CI. Build it with the documented `trunk build`
# pipeline (see README.md) against the wasm32-unknown-unknown target.
[package]
name = "swarm-demo"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib"]

# Standalone wasm-only crate: an empty workspace table keeps it out of the parent
# native workspace so `cargo build` at the repo root never tries to compile it
# for native. Build it with the Trunk pipeline in README.md.
[workspace]

[lints.rust]
# The demo is exercised only on wasm32; flag any code that would not run there.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(target_arch, values("wasm32"))'] }

[dependencies]
# The wasm client launch path and topology monitoring surface. The `swap`
# features wire SWAP cheque settlement into the launched client: cheque exchange
# is chain-free, and `swap-chequebook` adds on-chain cashout when an RPC URL is
# supplied.
vertex-swarm-node = { path = "../../crates/swarm/node", features = ["swap", "swap-chequebook"] }
vertex-swarm-api = { path = "../../crates/swarm/api" }
vertex-swarm-identity = { path = "../../crates/swarm/identity" }
vertex-swarm-spec = { path = "../../crates/swarm/spec" }
vertex-swarm-topology = { path = "../../crates/swarm/topology" }
vertex-swarm-primitives = { path = "../../crates/swarm/primitives" }
# The client cache: the IndexedDB-backed `ChunkStore` survives a page reload.
vertex-swarm-localstore = { path = "../../crates/swarm/localstore", features = ["indexeddb"] }
vertex-storage-indexeddb = { path = "../../crates/storage/indexeddb" }
vertex-net-dnsaddr-doh = { path = "../../crates/net/dnsaddr-doh" }

vertex-swarm-stream = { path = "../../crates/swarm/stream" }
# Browser clock (web-time) facade for the postage stamp timestamp.
vertex-util-runtime = { path = "../../crates/util/runtime" }

# The chunk provider/sender trait impls use async_trait, matching the vertex
# provider crates.
async-trait = "0.1"

# nectar: file chunking/joining, postage stamping (issuer + usage persistence),
# and mantaray manifests for the browser upload/download path. Tracks the same
# nectar source as the parent vertex workspace (`../../Cargo.toml`) so the
# path-dep vertex crates and the demo resolve a single copy of the shared nectar
# types (`ChunkAddress`, `Stamp`, `StampedChunk`). Default features only: no
# `parallel`/`wasm-threads`, keeping the single-threaded wasm profile (the demo
# never calls `initThreadPool`, so there is no rayon worker pool and no shared
# memory).
nectar-primitives = { git = "https://github.com/nxm-rs/nectar", branch = "main" }
nectar-postage = { git = "https://github.com/nxm-rs/nectar", branch = "main" }
# `local-signer` brings the alloy-signer-local re-export for the in-browser key.
nectar-postage-issuer = { git = "https://github.com/nxm-rs/nectar", branch = "main" }
# `issuer` + `seal` give signed content stamps (SnapshotIssuer) and the
# usage-persistence seal path; default `std` is implied.
nectar-postage-usage = { git = "https://github.com/nxm-rs/nectar", branch = "main", features = [
    "issuer",
    "seal",
    "client",
] }
nectar-mantaray = { git = "https://github.com/nxm-rs/nectar", branch = "main" }

# Chequebook address parsing for the optional SWAP config input and chain
# types/signing for the browser. alloy-sol-types decodes the BatchCreated log
# (the event ABI is not yet in nectar-contracts; defined locally; see
# client/chain.rs). alloy-signer-local holds the ephemeral upload key;
# alloy-signer's SignerSync drives the stamp signatures. Pinned to the workspace
# version so the `Address` type unifies with the node crate's.
alloy-primitives = { version = "1.6", default-features = false }
alloy-sol-types = { version = "1.6", default-features = false }
alloy-signer = { version = "2.0", default-features = false }
alloy-signer-local = { version = "2.0", default-features = false }

# Async stream + bytes plumbing for the joiner reassembly path.
# `alloc` enables the `buffer_unordered`/`FuturesUnordered` stream combinators
# used to fetch a file's leaf chunks concurrently in the download path.
futures = { version = "0.3", default-features = false, features = ["alloc"] }
# A wasm-compatible delay for the retrieval all-busy backoff (the same timer the
# staggered candidate race uses). The wasm-bindgen feature drives it off the
# browser event loop, matching the parent workspace's pin.
futures-timer = { version = "3", features = ["wasm-bindgen"] }
bytes = { version = "1", default-features = false }
hex = { version = "0.4", default-features = false, features = ["alloc"] }
# The task manager establishes the global executor that the node spawn paths
# (topology tasks, peer-manager tick, client service) resolve through
# `TaskExecutor::current`. The demo owns it for the page session.
vertex-tasks = { path = "../../crates/tasks" }

# libp2p Multiaddr only; the trimmed wasm feature set mirrors the node crate.
libp2p = { git = "https://github.com/nxm-rs/rust-libp2p", rev = "6454fdf3450f91fdbb6e3306daa7a9a4e633c133", default-features = false }

# wasm-bindgen surface and browser bindings.
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Document",
    "Window",
    "Element",
    "HtmlElement",
    "CssStyleDeclaration",
    "Location",
    "Node",
    "Text",
    "UrlSearchParams",
    "HtmlInputElement",
    "Event",
    "EventTarget",
    "File",
    "FileList",
    "Blob",
    # `fetch`-based JSON-RPC for the gnosis log query (Milestone 4).
    "Request",
    "RequestInit",
    "Response",
    "Headers",
] }
gloo-timers = { version = "0.3", features = ["futures"] }
console_error_panic_hook = "0.1"
tracing = "0.1"
tracing-wasm = "0.2"
# Per-target log filtering layered over the tracing-wasm console layer. We use
# `filter::Targets` (not `EnvFilter`) deliberately: `Targets` needs only `std` +
# `registry`, both already pulled in transitively by `tracing-wasm`, whereas
# `EnvFilter` would drag in `regex-automata`/`matchers` and bloat the wasm
# bundle. `registry` (which implies `std`) also enables per-layer filtering.
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "std",
    "registry",
] }

# The topology event stream is a tokio broadcast channel; only the sync feature
# is needed in the browser (no runtime, no net).
tokio = { version = "1", default-features = false, features = ["sync"] }

# libp2p (and the alloy nonce path) pull getrandom 0.3 transitively; on wasm32
# its browser backend needs the `wasm_js` feature. The matching
# `getrandom_backend="wasm_js"` cfg is set in .cargo/config.toml. This is a
# transitive build requirement, not a direct API use.
getrandom_03 = { package = "getrandom", version = "0.3", default-features = false, features = ["wasm_js"] }
