# Trunk build/serve config for the browser Swarm client demo. Single-threaded
# wasm on the pinned stable toolchain; the only wasm rustflag lives in the
# demo-local .cargo/config.toml. See README.md for the toolchain setup.

[build]
target = "index.html"
dist = "dist"

[serve]
address = "127.0.0.1"
port = 8080
